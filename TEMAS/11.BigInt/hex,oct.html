<!DOCTYPE html>
<html>
<body>
<h1>JavScript Bigint</h1>
<h2>Normal, Octal, Hexadecimal and Binary</h2>

<p id="demo"></p>

<script>
let num = 256n;
let oct = 0o400n;
let hex = 0x100n;
let bin = 0b100000000n;

document.getElementById("demo").innerHTML = num + "<br>" + oct + "<br>" + hex + "<br>" + bin; 
</script>

</body>
</html>
