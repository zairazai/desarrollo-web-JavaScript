<!DOCTYPE html>

<h1>JavScript Bigint</h1>
<h2>BigInt Multiply</h2>
<p>BigInt supports standard JavaScript arithmetic operators.</p>

<p id="demo"></p>

<script>
let x = 9007199254740995n;
let y = 9007199254740995n;

let z = x * y;

document.getElementById("demo").innerHTML = z; 
</script>
