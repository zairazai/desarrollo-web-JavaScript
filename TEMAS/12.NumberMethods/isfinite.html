<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Numbers</h1>
<h2>The Number.isFinite() Method</h2>

<p>The isFinite() method returns true if the argument is not Infinity nor Nan.</p>

<p id="demo"></p>

<script>
let result = Number.isFinite(123);
document.getElementById("demo").innerHTML = result;
</script>
</body>
</html>
