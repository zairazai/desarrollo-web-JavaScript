<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Numbers</h1>
<h2>The Number.isNaN() Method</h2>

<p>The isNaN() method returns true if the argument is NaN (Not a Number).</p>

<p id="demo"></p>

<script>
let result = Number.isNaN(123);
document.getElementById("demo").innerHTML = result;
</script>
</body>
</html>
