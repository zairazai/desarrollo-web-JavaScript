<h1>JavaScript Functions</h1>
<h2>Arrow Functions</h2>

<p>If a function has only one parameter, you can omit the parentheses.</p>

<p id="demo"></p>

<script>
const square = (x) => x * x;

document.getElementById("demo").innerHTML = "The sqare of 3 is " + square(3);
</script>
