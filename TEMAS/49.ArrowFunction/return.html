<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>
<h2>Arrow Functions</h2>

<p>An Arrow Function without the brackets or the return keyword.</p>

<p id="demo"></p>

<script>
const hello = () => "Hello World!";

document.getElementById("demo").innerHTML = hello();
</script>

</body>
</html>
