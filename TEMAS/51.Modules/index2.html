<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Modules</h1>
<h3>Import name and age from person.js</h3>

<p id="demo"></p>

<script type="module">
import { name, age } from "./person.js";

let text = "My name is " + name + ", I am " + age + ".";

document.getElementById("demo").innerHTML = text;
</script>

</body>
</html>
